services:
  # Backend - FastAPI
  - type: web
    name: hyerin-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ALLOWED_ORIGINS
        value: https://hyerin-frontend.onrender.com

  # Frontend - React + Vite (Static Site)
  - type: web
    name: hyerin-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://hyerin-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
